[workspace]
name = "mltutorials"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.12.0,<3.13"
ipython = "*"
jupyter = "*"
ipywidgets = "*"
numpy = "*"
scipy = "*"
matplotlib = "*"
pandas = "*"
pillow = "*"
scikit-learn = "*"
plotly = ">=6.6.0,<7"
anywidget = ">=0.11.0,<0.12"

[feature.manim.dependencies]
manim = ">=0.20.1,<0.21"


# Default (CPU / generic) torch 
[feature.torch.pypi-dependencies]
torch = ">=2.5.0, <3"
torchvision = ">=0.20.0, <1"

[feature.rocm]
platforms = ["linux-64"]

# ROCm torch — install from the AMD ROCm PyPI index (for local AMD GPU use)
[feature.rocm.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/rocm7.2"]

[feature.rocm.dependencies]
setuptools = "<82"

[feature.rocm.pypi-dependencies]
torch = { version = ">=2.5.0, <3", index = "https://download.pytorch.org/whl/rocm7.2" }
torchvision = { version = ">=0.20.0, <1", index = "https://download.pytorch.org/whl/rocm7.2" }

[feature.quarto.dependencies]
quarto = "*"

[environments]
default = ["torch"]
local-amd = ["rocm"]
quarto = ["quarto"]
manim = ["manim", "torch"]

[tasks.render]
cmd = "make"
default-environment="quarto"


